<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Free-Edex</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background: linear-gradient(120deg, #bbdefb, #90caf9, #64b5f6);
      background-size: 400% 400%;
      animation: gradientMove 12s ease-in-out infinite;
      font-family: 'Poppins', sans-serif;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .form-container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-box {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px 50px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    h2 {
      color: #0d47a1;
      font-weight: 700;
      margin-bottom: 25px;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <div class="form-box">
      <img src="Free-edx logo.png" width="80" height="80" alt="Free-Edex Logo" class="mb-3">
      <h2>Welcome Back!</h2>
      <form id="loginForm">
        <div class="mb-3 text-start">
          <label class="form-label">Email ID</label>
          <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email" required>
        </div>
        <div class="mb-4 text-start">
          <label class="form-label">Password</label>
          <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
      </form>
      <p class="mt-3">Don’t have an account? <a href="signup.html">Sign up here</a></p>
    </div>
  </div>

  <script>
    // Handle Login
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value.trim();

      const storedEmail = localStorage.getItem("freeedexEmail");
      const storedPassword = localStorage.getItem("freeedexPassword");

      if (email === storedEmail && password === storedPassword) {
        alert("Login successful! Redirecting to Free-Edex...");
        window.location.href = "index.html";
      } else {
        alert("Invalid email or password. Please try again.");
      }
    });
  </script>

</body>
</html>
