<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Free-Edex</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background: linear-gradient(135deg, #e3f2fd, #bbdefb, #90caf9);
      background-size: 400% 400%;
      animation: gradientMove 12s ease-in-out infinite;
      font-family: 'Poppins', sans-serif;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .form-container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-box {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px 50px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    h2 {
      color: #0d47a1;
      font-weight: 700;
      margin-bottom: 25px;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <div class="form-box">
      <img src="Free-edx logo.png" width="80" height="80" alt="Free-Edex Logo" class="mb-3">
      <h2>Create an Account</h2>
      <form id="signupForm">
        <div class="mb-3 text-start">
          <label class="form-label">Email ID</label>
          <input type="email" id="signupEmail" class="form-control" placeholder="Enter your email" required>
        </div>
        <div class="mb-4 text-start">
          <label class="form-label">Password</label>
          <input type="password" id="signupPassword" class="form-control" placeholder="Create a password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3">Sign Up</button>
      </form>
      <p class="mt-3">Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </div>

  <script>
    // Handle Sign-Up
    document.getElementById("signupForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value.trim();

      if (!email || !password) {
        alert("Please fill in both fields.");
        return;
      }

      // Save to localStorage
      localStorage.setItem("freeedexEmail", email);
      localStorage.setItem("freeedexPassword", password);

      alert("Sign-up successful! Please log in now.");
      window.location.href = "login.html";
    });
  </script>

</body>
</html>
